<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission - Spyser Tuition</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 10px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; height: 60px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background: #0056b3; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #555; }
        .footer-link a { color: #28a745; text-decoration: none; font-weight: bold; }
        .footer-link a:hover { text-decoration: underline; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Admission Form</h2>
    <form id="admission-form">
        
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Personal Phone</label>
                <input type="tel" id="personalPhone" required>
            </div>
            <div class="form-group">
                <label>Parent's Phone</label>
                <input type="tel" id="parentPhone">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="">Select...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <select id="bloodGroup">
                    <option value="">Select...</option>
                    <option value="A+">A+</option> <option value="A-">A-</option>
                    <option value="B+">B+</option> <option value="B-">B-</option>
                    <option value="O+">O+</option> <option value="O-">O-</option>
                    <option value="AB+">AB+</option> <option value="AB-">AB-</option>
                </select>
            </div>
            <div class="form-group">
                <label>School Name</label>
                <input type="text" id="school">
            </div>
            <div class="form-group">
                <label>Class/Grade</label>
                <input type="text" id="classGrade">
            </div>
            <div class="form-group full-width">
                <label>Full Address</label>
                <textarea id="address"></textarea>
            </div>
        </div>

        <button type="submit">Submit Application</button>
    </form>
    
    <div id="message"></div>
    
    <div class="footer-link">
        Already registered? <a href="/index.html">Login Here</a>
    </div>
</div>

<script>
    document.getElementById('admission-form').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const payload = {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            personalPhone: document.getElementById('personalPhone').value,
            parentPhone: document.getElementById('parentPhone').value,
            dob: document.getElementById('dob').value,
            gender: document.getElementById('gender').value,
            bloodGroup: document.getElementById('bloodGroup').value,
            school: document.getElementById('school').value,
            classGrade: document.getElementById('classGrade').value,
            address: document.getElementById('address').value
        };

        const messageDiv = document.getElementById('message');
        messageDiv.style.backgroundColor = "#e9ecef";
        messageDiv.style.color = "#333";
        messageDiv.textContent = "Processing application...";

        try {
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (response.ok) {
                messageDiv.style.backgroundColor = "#d4edda";
                messageDiv.style.color = "#155724";
                messageDiv.innerHTML = `${data.message}<br>Your Admission Number is: <b style="font-size: 18px;">${data.admissionNumber}</b><br><br>Please save this number.`;
                document.getElementById('admission-form').reset(); 
            } else {
                messageDiv.style.backgroundColor = "#f8d7da";
                messageDiv.style.color = "#721c24";
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.style.backgroundColor = "#f8d7da";
            messageDiv.style.color = "#721c24";
            messageDiv.textContent = "Cannot connect to server.";
        }
    });
</script>

</body>
</html>
