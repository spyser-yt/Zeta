<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Auth System</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .toggle-text { text-align: center; margin-top: 15px; font-size: 14px; color: #555; cursor: pointer; }
        .toggle-text span { color: #007bff; text-decoration: underline; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="form-title">Login</h2>
    <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="submit-btn">Login</button>
    </form>
    <div class="toggle-text" id="toggle-mode">Don't have an account? <span>Sign Up</span></div>
    <div id="message"></div>
</div>

<script>
    let isLoginMode = true;
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleMode = document.getElementById('toggle-mode');
    const messageDiv = document.getElementById('message');

    // Toggle between Login and Signup modes
    toggleMode.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        formTitle.textContent = isLoginMode ? "Login" : "Sign Up";
        submitBtn.textContent = isLoginMode ? "Login" : "Sign Up";
        toggleMode.innerHTML = isLoginMode ? 
            `Don't have an account? <span>Sign Up</span>` : 
            `Already have an account? <span>Login</span>`;
        messageDiv.textContent = ""; 
    });

    // Handle Form Submission dynamically
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop page from reloading
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const endpoint = isLoginMode ? '/api/login' : '/api/signup';

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            
            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.textContent = data.message;
            } else {
                messageDiv.style.color = "red";
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.textContent = "Cannot connect to server.";
        }
    });
</script>

</body>
</html>
