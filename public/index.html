<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zeta Coaching Centre</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .footer-link { margin-top: 20px; font-size: 14px; color: #555; }
        .footer-link a { color: #e67e22; text-decoration: none; font-weight: bold; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Zeta Login</h2>
    <form id="login-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Access Portal</button>
    </form>
    
    <div id="message"></div>
    
    <div class="footer-link">
        New to Zeta? <a href="/signup_step1.html">Apply for Admission</a>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const messageDiv = document.getElementById('message');
        messageDiv.style.color = "#333";
        messageDiv.textContent = "Authenticating...";

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.textContent = data.message;
                
                // Save specific Zeta IDs to memory
                localStorage.setItem('zeta_role', data.role);
                localStorage.setItem('zeta_name', data.fullName);
                localStorage.setItem('zeta_id', data.admissionNumber);
                localStorage.setItem('zeta_class', data.classGrade);
                localStorage.setItem('zeta_school', data.school);
                
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } else {
                messageDiv.style.color = "red";
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.textContent = "Cannot connect to server.";
        }
    });
</script>

</body>
</html>
