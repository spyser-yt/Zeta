<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spyser Tuition</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #555; }
        .footer-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        .footer-link a:hover { text-decoration: underline; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Login</h2>
    <form id="login-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    
    <div id="message"></div>
    
    <div class="footer-link">
        New Student? <a href="/admission.html">Apply for Admission</a>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const messageDiv = document.getElementById('message');
        messageDiv.style.color = "#333";
        messageDiv.textContent = "Authenticating...";

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.textContent = data.message;
                
                // Save digital ID and redirect to Dashboard
                localStorage.setItem('spyser_role', data.role);
                localStorage.setItem('spyser_admission_number', data.admissionNumber);
                
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
            } else {
                messageDiv.style.color = "red";
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.textContent = "Cannot connect to server.";
        }
    });
</script>

</body>
</html>
