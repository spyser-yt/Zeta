<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyser Tuition Management</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; height: 60px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; }
        .toggle-text { text-align: center; margin-top: 20px; font-size: 14px; color: #555; cursor: pointer; }
        .toggle-text span { color: #007bff; text-decoration: underline; font-weight: bold; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; }
        
        /* Hide signup fields by default */
        .signup-only { display: none; }
        /* When form is in signup mode, show them */
        .mode-signup .signup-only { display: block; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <h2 id="form-title">Login</h2>
    <form id="auth-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <div class="signup-only">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName">
            </div>
            <div class="form-group">
                <label>Personal Phone</label>
                <input type="tel" id="personalPhone">
            </div>
            <div class="form-group">
                <label>Parent Phone</label>
                <input type="tel" id="parentPhone">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="">Select...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <select id="bloodGroup">
                    <option value="">Select...</option>
                    <option value="A+">A+</option> <option value="A-">A-</option>
                    <option value="B+">B+</option> <option value="B-">B-</option>
                    <option value="O+">O+</option> <option value="O-">O-</option>
                    <option value="AB+">AB+</option> <option value="AB-">AB-</option>
                </select>
            </div>
            <div class="form-group">
                <label>School Name</label>
                <input type="text" id="school">
            </div>
            <div class="form-group">
                <label>Class/Grade</label>
                <input type="text" id="classGrade">
            </div>
            <div class="form-group">
                <label>Full Address</label>
                <textarea id="address"></textarea>
            </div>
        </div>

        <button type="submit" id="submit-btn">Login</button>
    </form>
    <div class="toggle-text" id="toggle-mode">New Student? <span>Apply for Admission</span></div>
    <div id="message"></div>
</div>

<script>
    let isLoginMode = true;
    const formContainer = document.getElementById('form-container');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleMode = document.getElementById('toggle-mode');
    const messageDiv = document.getElementById('message');

    toggleMode.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            formContainer.classList.remove('mode-signup');
            formTitle.textContent = "Login";
            submitBtn.textContent = "Login";
            toggleMode.innerHTML = `New Student? <span>Apply for Admission</span>`;
        } else {
            formContainer.classList.add('mode-signup');
            formTitle.textContent = "Student Admission";
            submitBtn.textContent = "Submit Application";
            toggleMode.innerHTML = `Already registered? <span>Login Here</span>`;
        }
        messageDiv.textContent = ""; 
    });

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        // Collect basic data
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        // If signup, collect the rest
        if (!isLoginMode) {
            payload.fullName = document.getElementById('fullName').value;
            payload.personalPhone = document.getElementById('personalPhone').value;
            payload.parentPhone = document.getElementById('parentPhone').value;
            payload.dob = document.getElementById('dob').value;
            payload.gender = document.getElementById('gender').value;
            payload.bloodGroup = document.getElementById('bloodGroup').value;
            payload.school = document.getElementById('school').value;
            payload.classGrade = document.getElementById('classGrade').value;
            payload.address = document.getElementById('address').value;
        }

        const endpoint = isLoginMode ? '/api/login' : '/api/signup';

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.textContent = data.message;
                if (!isLoginMode && data.admissionNumber) {
                    messageDiv.innerHTML += `<br>Your Admission Number is: <b>${data.admissionNumber}</b>`;
                }
            } else {
                messageDiv.style.color = "red";
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.textContent = "Cannot connect to server.";
        }
    });
</script>

</body>
</html>
