<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta Portal</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #e67e22; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--primary); }
        .role-title { font-size: 20px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .profile-icon { width: 40px; height: 40px; background: var(--secondary); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px;}

        .sidebar { position: fixed; left: -280px; top: 0; height: 100%; width: 280px; background: var(--primary); color: white; transition: 0.3s; z-index: 200; padding: 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; }
        .overlay.active { display: block; }
        .sidebar h2 { border-bottom: 1px solid #555; padding-bottom: 15px; color: var(--secondary);}
        .sidebar p { padding: 10px; cursor: pointer; border-radius: 4px;}
        .sidebar p:hover { background: #34495e; }

        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .info-card { background: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--secondary); box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .info-card p { margin: 8px 0; font-size: 16px; font-weight: bold; color: #444;}

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } } 
        
        .grid-item { background: white; padding: 25px 10px; border-radius: 12px; text-align: center; font-weight: bold; color: var(--primary); box-shadow: 0 4px 8px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .grid-item:active { transform: scale(0.95); }
        .grid-item:hover { border-color: var(--secondary); }

        .poster-area { background: #e0e0e0; height: 150px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #777; font-weight: bold; text-transform: uppercase; border: 2px dashed #bbb; }

        #profile-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 300; flex-direction: column; align-items: center; padding-top: 50px; overflow-y: auto;}
        .big-photo { width: 120px; height: 120px; background: var(--secondary); border-radius: 50%; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: white; }
        .profile-info-box { width: 85%; max-width: 400px; border: 2px solid #eee; padding: 20px; border-radius: 12px; background: #fafafa; margin-bottom: 30px; }
        .profile-info-box p { margin: 10px 0; font-size: 16px;}
        .close-profile { position: absolute; top: 20px; right: 20px; font-size: 20px; font-weight: bold; cursor: pointer; color: #555;}
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 12px 40px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <script>
        const role = localStorage.getItem('zeta_role');
        const name = localStorage.getItem('zeta_name');
        if (!role) window.location.href = '/index.html';
    </script>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="role-title" id="role-text">Portal</div>
        <div class="profile-icon" onclick="toggleProfile(true)" id="user-initial">Z</div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h2>Zeta Menu</h2>
        <p>Home Dashboard</p>
        <p>Notifications</p>
        <p>Settings</p>
    </div>

    <div class="container">
        <div class="info-card">
            <p id="info-name">Name: Loading...</p>
            <p id="info-extra-1">Detail 1: Loading...</p>
            <p id="info-extra-2">Detail 2: Loading...</p>
        </div>

        <div class="grid" id="action-grid"></div>

        <div class="poster-area">Promotional Posters Area</div>
    </div>

    <div id="profile-view">
        <div class="close-profile" onclick="toggleProfile(false)">✖</div>
        <div class="big-photo" id="profile-initial">Z</div>
        <h2 id="profile-name">User Name</h2>
        <div class="profile-info-box" id="profile-details"></div>
        <button class="logout-btn" onclick="logout()">Secure Logout</button>
    </div>

    <script>
        document.getElementById('role-text').innerText = role;
        document.getElementById('user-initial').innerText = name ? name[0] : 'Z';
        document.getElementById('profile-initial').innerText = name ? name[0] : 'Z';
        document.getElementById('profile-name').innerText = name;

        const grid = document.getElementById('action-grid');
        const info1 = document.getElementById('info-extra-1');
        const info2 = document.getElementById('info-extra-2');

        if (role === 'Student') {
            document.getElementById('info-name').innerText = `Name: ${name}`;
            info1.innerText = `Class: ${localStorage.getItem('zeta_class')}`;
            info2.innerText = `Fees Pending: Updating...`; 
            grid.innerHTML = `
                <div class="grid-item">Attendance</div>
                <div class="grid-item">Fee Status</div>
                <div class="grid-item">Homework</div>
                <div class="grid-item">Exam Marks</div>
            `;
        } else if (role === 'Teacher') {
            document.getElementById('info-name').innerText = `Name: ${name}`;
            info1.innerText = `Department: Teaching Staff`;
            info2.innerText = `Salary Status: Active`;
            grid.innerHTML = `
                <div class="grid-item">Attendance Register</div>
                <div class="grid-item">My Salary</div>
                <div class="grid-item">Assign Homework</div>
                <div class="grid-item">Upload Marks</div>
            `;
        } else if (role === 'Admin') {
            document.getElementById('info-name').innerText = `Admin: ${name}`;
            info1.innerText = `System Status: Online`;
            info2.innerText = `Database: Connected`;
            grid.innerHTML = `
                <div class="grid-item">Manage Students</div>
                <div class="grid-item">Manage Teachers</div>
                <div class="grid-item">Fee Collection</div>
                <div class="grid-item">System Logs</div>
            `;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleProfile(show) {
            const profileView = document.getElementById('profile-view');
            profileView.style.display = show ? 'flex' : 'none';
            if(show) {
                document.getElementById('profile-details').innerHTML = `
                    <p><b>Zeta ID:</b> ${localStorage.getItem('zeta_id')}</p>
                    <p><b>Role Level:</b> ${role}</p>
                    <p><b>Institution:</b> ${localStorage.getItem('zeta_school')}</p>
                `;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
